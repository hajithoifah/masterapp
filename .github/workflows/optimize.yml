name: Optimize Wallpapers and Update Content

on:
  workflow_dispatch:
  push:
    paths:
      - 'raw_wallpapers/**.jpg'
      - 'raw_wallpapers/**.jpeg'
      - 'raw_wallpapers/**.png'
      - 'scripts/process_wallpapers.py'

permissions:
  contents: write

jobs:
  optimize-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Run optimization script
        run: python scripts/process_wallpapers.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wallpapers/ || true
          git add content.json || true
          git commit -m "Auto-convert new wallpapers to webp and update content.json" || echo "No changes to commit"
          git push
